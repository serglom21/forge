name: Validation Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: validation-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.11.1'
  PNPM_VERSION: '8.15.4'

jobs:
  protect-curated-assets:
    name: Protect curated assets
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Block unapproved changes to protected files
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          PROTECTED=$(echo "$CHANGED" | grep -E '^(patterns/|MISSION\.md$|PROJECT_CONTEXT\.md$|CLAUDE\.md$|\.github/workflows/)' || true)
          if [ -n "$PROTECTED" ]; then
            LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
            if ! echo "$LABELS" | grep -q 'human-reviewed'; then
              echo "::error::PR touches protected files without 'human-reviewed' label."
              echo "$PROTECTED"
              exit 1
            fi
          fi

  verify:
    name: make verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: make verify

  validation-gate-passed:
    name: Validation gate passed
    needs: [protect-curated-assets, verify]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          set -euo pipefail
          RESULTS='${{ toJSON(needs) }}'
          FAILED=$(echo "$RESULTS" | jq -r 'to_entries[] | select(.value.result != "success" and .value.result != "skipped") | .key')
          if [ -n "$FAILED" ]; then
            echo "::error::Gate failed:"
            echo "$FAILED"
            exit 1
          fi
