id: db_query_business_context
title: Business context on DB query spans
maturity: stable

verticals: [any]
stacks: [nextjs-express]
layer: backend

composes_with: [custom_business_span]
requires_parent: true

vocabulary:
  attribute_key:    { required: true, description: "Business attribute to attach (e.g. transfer.amount)" }
  attribute_source: { required: true, description: "Expression that reads the value (e.g. req.body.amount)" }

spans:
  - id: "db.query.enhanced"
    source: sdk_enhanced
    op: db.query
    expected_attributes: [db.system, db.operation, db.statement]
    attributes_to_inject:
      - key: "{attribute_key}"
        source: "{attribute_source}"
        injection_point: "before_query"

sdk_requirements:
  - integration: nodeProfilingIntegration
    package: "@sentry/node"
    reason: "Required for DB auto-instrumentation"

sdk_min_version:
  "@sentry/node": "7.100.0"

reference_guidance:
  in_your_codebase: |
    Before your DB call, attach a business attribute to the active span:
      Sentry.getActiveSpan()?.setAttribute("transfer.amount", amount);
    The DB span itself is auto-captured by the SDK — don't wrap it
    manually or you'll get two spans for one query.
